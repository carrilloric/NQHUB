# PostgreSQL Configuration optimized for 8GB CSV file processing
# NQHUB ETL System

# =============================================================================
# MEMORY CONFIGURATION
# =============================================================================

# Shared memory for all connections (25% of available RAM)
shared_buffers = 4GB

# Memory per query operation - increased for complex CTEs
# (was 4MB default, now 16MB for better aggregation performance)
work_mem = 16MB

# Memory for maintenance operations (CREATE INDEX, VACUUM, etc)
maintenance_work_mem = 1GB

# Estimate of OS cache size for query planning
effective_cache_size = 12GB

# =============================================================================
# CONNECTION SETTINGS
# =============================================================================

# Maximum number of concurrent connections
max_connections = 100

# Reserve connections for superuser
superuser_reserved_connections = 3

# =============================================================================
# CHECKPOINT AND WAL SETTINGS
# =============================================================================

# Maximum time between automatic WAL checkpoints
checkpoint_timeout = 15min

# Target for checkpoint completion (as fraction of checkpoint_timeout)
checkpoint_completion_target = 0.9

# Maximum size of WAL between checkpoints
max_wal_size = 4GB
min_wal_size = 1GB

# =============================================================================
# QUERY TUNING
# =============================================================================

# Enable parallel queries for better performance on large datasets
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# Cost-based settings for query planner
random_page_cost = 1.1  # SSD optimized (default is 4.0 for HDD)
effective_io_concurrency = 200  # For SSD

# =============================================================================
# TIMESCALEDB SPECIFIC
# =============================================================================

# TimescaleDB background workers for continuous aggregates
timescaledb.max_background_workers = 8

# =============================================================================
# LOGGING
# =============================================================================

# Log slow queries for performance monitoring
log_min_duration_statement = 1000  # Log queries slower than 1 second
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

# =============================================================================
# STATISTICS
# =============================================================================

# Track function execution statistics
track_functions = pl
track_activity_query_size = 2048

# Enable pg_stat_statements for query performance monitoring
shared_preload_libraries = 'timescaledb,pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# =============================================================================
# AUTOVACUUM TUNING
# =============================================================================

# More aggressive autovacuum for high-volume inserts
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 10s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# =============================================================================
# LOCK MANAGEMENT
# =============================================================================

# Avoid lock timeout issues during large operations
lock_timeout = 0
idle_in_transaction_session_timeout = 30min

# =============================================================================
# PERFORMANCE FEATURES
# =============================================================================

# Enable JIT compilation for complex queries (PostgreSQL 11+)
jit = on
jit_above_cost = 100000

# Optimize for bulk inserts
synchronous_commit = off  # Acceptable for ETL workloads
wal_buffers = 16MB