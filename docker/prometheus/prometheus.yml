global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'nqhub-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nqhub-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/api/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
