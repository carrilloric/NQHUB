---
# NVIDIA Drivers and CUDA Installation

- name: Install NVIDIA driver dependencies
  apt:
    name:
      - build-essential
      - dkms
    state: present

- name: Add NVIDIA PPA
  apt_repository:
    repo: ppa:graphics-drivers/ppa
    state: present

- name: Install NVIDIA driver
  apt:
    name: nvidia-driver-535
    state: present
    update_cache: yes

- name: Add NVIDIA Docker GPG key
  apt_key:
    url: https://nvidia.github.io/nvidia-docker/gpgkey
    state: present

- name: Add NVIDIA Docker repository
  apt_repository:
    repo: "deb https://nvidia.github.io/nvidia-docker/{{ ansible_distribution | lower }}{{ ansible_distribution_version }}/$(ARCH) /"
    state: present

- name: Install nvidia-docker2
  apt:
    name:
      - nvidia-docker2
      - nvidia-container-toolkit
    state: present
    update_cache: yes

- name: Restart Docker to load NVIDIA runtime
  service:
    name: docker
    state: restarted

- name: Verify NVIDIA driver installation
  command: nvidia-smi
  register: nvidia_smi
  changed_when: false
  failed_when: nvidia_smi.rc != 0

- name: Display NVIDIA info
  debug:
    var: nvidia_smi.stdout_lines
