# config file version
apiVersion: 1

providers:
  # <name> the name of the dashboard provider, required
  - name: 'NQHUB Dashboards'
    # <orgId> org id. Default to 1
    orgId: 1
    # <folder> name of the dashboard folder.
    folder: 'NQHUB'
    # <folderUid> UID of the dashboard folder
    folderUid: 'nqhub'
    # <type> provider type. Default to 'file'
    type: file
    # <disableDeletion> disable dashboard deletion
    disableDeletion: false
    # <updateIntervalSeconds> how often Grafana will scan for changed dashboards
    updateIntervalSeconds: 10
    # <allowUiUpdates> allow updating provisioned dashboards from the UI
    allowUiUpdates: true
    options:
      # <path> path to dashboard files on disk. Required when using the 'file' type
      path: /var/lib/grafana/dashboards
      # <foldersFromFilesStructure> use folder names from filesystem structure
      foldersFromFilesStructure: true
