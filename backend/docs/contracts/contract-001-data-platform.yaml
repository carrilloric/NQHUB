            max_delta: 312
            min_delta: -67
            delta_change: 89
            vwap: 21537.82
            typical_price: 21538.42
            range: 10.50
            body_size: 6.50
            wick_upper: 1.75
            wick_lower: 2.25
            body_percentage: 61.90
