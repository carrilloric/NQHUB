  /api/v1/etl/jobs/{job_id}/logs:
    get:
      tags:
      - ETL
      - ETL
      summary: Get Job Logs
      description: "Get logs for a specific ETL job with optional filtering.\n\nArgs:\n\
        \    job_id: UUID of the job\n    skip: Number of records to skip (pagination)\n\
        \    limit: Maximum number of records to return\n    level: Optional log level\
        \ filter (INFO, WARNING, ERROR, DEBUG)\n\nReturns:\n    ETLJobLogList: List\
        \ of log entries with total count"
      operationId: get_job_logs_api_v1_etl_jobs__job_id__logs_get
      security:
      - HTTPBearer: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Job Id
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          default: 100
          title: Limit
      - name: level
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            pattern: ^(INFO|WARNING|ERROR|DEBUG)$
          - type: 'null'
          title: Level
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ETLJobLogList'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/etl/worker/status:
    get:
      tags:
      - ETL
      - ETL
      summary: Get Worker Status
      description: "Check RQ worker status and get worker information.\n\nReturns:\n\
        \    dict: Worker status including:\n        - workers: List of active workers\
        \ with details\n        - total_workers: Count of active workers\n       \
        \ - healthy: Boolean indicating if at least one worker is active"
      operationId: get_worker_status_api_v1_etl_worker_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/etl/jobs/cleanup:
    delete:
      tags:
      - ETL
      - ETL
      summary: Cleanup Jobs
      description: "Cleanup old ETL jobs based on status and age.\n\nArgs:\n    status_filter:\
        \ Status to filter ('pending', 'failed', 'completed', 'all')\n    older_than_hours:\
        \ Delete jobs older than this many hours (default 24, max 720)\n\nReturns:\n\
        \    dict: Number of jobs deleted"
      operationId: cleanup_jobs_api_v1_etl_jobs_cleanup_delete
      security:
      - HTTPBearer: []
      parameters:
      - name: status_filter
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            pattern: ^(pending|failed|completed|all)$
          - type: 'null'
          default: pending
          title: Status Filter
      - name: older_than_hours
        in: query
        required: false
        schema:
          type: integer
          maximum: 720
          minimum: 1
          default: 24
          title: Older Than Hours
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/etl/active-contract:
    get:
      tags:
      - ETL
      - ETL
      summary: Get Current Active Contract
      description: "Get the current active contract (front month).\n\nReturns the\
        \ contract with the highest trading volume that is currently active.\nThe\
        \ active contract is determined by analyzing daily volume and identifying\n\
        rollover periods.\n\nReturns:\n    CurrentActiveContract: Current active contract\
        \ with symbol, start_date, and volume metrics\n\nRaises:\n    404: If no active\
        \ contract is found in the database"
      operationId: get_current_active_contract_api_v1_etl_active_contract_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentActiveContract'
  /api/v1/etl/active-contract/history:
    get:
      tags:
      - ETL
      - ETL
      summary: Get Active Contract History
      description: "Get historical active contract periods.\n\nReturns a list of active\
        \ contract periods ordered by most recent first.\nEach period represents a\
        \ time range when a specific contract was the dominant\nfront month contract\
        \ based on volume analysis.\n\nArgs:\n    limit: Maximum number of periods\
        \ to return (default 10, max 100)\n\nReturns:\n    ActiveContractHistory:\
        \ List of active contract periods with total count"
      operationId: get_active_contract_history_api_v1_etl_active_contract_history_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Maximum number of periods to return
          default: 10
          title: Limit
        description: Maximum number of periods to return
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveContractHistory'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/etl/rollover-periods:
    get:
      tags:
      - ETL
      - ETL
      summary: Get Rollover Events
      description: "Get rollover events (contract transitions).\n\nA rollover event\
        \ occurs when trading volume shifts from one futures contract\nto the next\
        \ (e.g., from NQM4 to NQU4). This endpoint identifies consecutive\nactive\
        \ contract periods and returns the transition details.\n\nArgs:\n    limit:\
        \ Maximum number of rollover events to return (default 10, max 50)\n\nReturns:\n\
        \    List[RolloverEvent]: List of rollover events with from/to symbols, date,\
        \ and volumes"
      operationId: get_rollover_events_api_v1_etl_rollover_periods_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          description: Maximum number of rollovers to return
          default: 10
          title: Limit
        description: Maximum number of rollovers to return
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RolloverEvent'
                title: Response Get Rollover Events Api V1 Etl Rollover Periods Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/etl/integrity:
    get:
      tags:
      - ETL
      - ETL
      summary: Check Data Integrity
      description: 'Check data integrity by comparing candle counts across timeframes.


        Verifies mathematical relationships between timeframes:

        - 2 candles of 30s = 1 candle of 1min

        - 5 candles of 1min = 1 candle of 5min

        - etc.


        Returns comparison table with expected vs actual counts.'
      operationId: check_data_integrity_api_v1_etl_integrity_get
      parameters:
      - name: start_date
        in: query
        required: true
        schema:
          type: string
          format: date
          description: Start date for integrity check
          title: Start Date
        description: Start date for integrity check
      - name: end_date
        in: query
        required: true
        schema:
          type: string
          format: date
          description: End date for integrity check
          title: End Date
        description: End date for integrity check
      - name: symbol
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Symbol to check (optional)
          title: Symbol
        description: Symbol to check (optional)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrityCheckResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
