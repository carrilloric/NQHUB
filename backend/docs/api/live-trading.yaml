                type: array
                title: Response Get Rollover Periods Api V1 Api V1 Data Rollover Periods
                  Get
  /api/v1/api/v1/data/export:
    post:
      tags:
      - data
      - data
      summary: Export To Gcs
      description: 'Export data to Google Cloud Storage (GCS).


        Triggers an async Celery task to export data in the specified format.


        **Returns:** Task ID for tracking the export progress.


        **Supported formats:**

        - parquet: Columnar format, best for analytics

        - csv: Text format, universal compatibility


        **Note:** This is an async operation. Use the task_id to check status via
        /jobs/{task_id}.'
      operationId: export_to_gcs_api_v1_api_v1_data_export_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/app__api__v1__data__routes__ExportRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__api__v1__data__routes__ExportResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/api/v1/data/health:
