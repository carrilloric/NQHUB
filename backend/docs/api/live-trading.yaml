    get:
      tags:
      - data
      - data
      summary: Get Active Contract
      description: 'Get the currently active NQ contract (front month).


        Returns the symbol, expiry date, and recommended roll date.


        **Roll date:** Typically 8 trading days before expiry to avoid low liquidity.'
      operationId: get_active_contract_api_v1_api_v1_data_contracts_active_get
