      description: "Register a strategy from notebook or external script.\n\nThis\
        \ endpoint allows researchers to register strategy instances\ninto the central\
        \ StrategyRegistry for later use in backtesting\nand live trading.\n\nUsage\
        \ (from Jupyter notebook):\n    import requests\n\n    # Define strategy\n\
        \    class MyFVGStrategy(RuleBasedStrategy):\n        def required_features(self):\n\
        \            return [\"active_fvgs\", \"bias\"]\n\n        def generate_signals(self,\
        \ market_state, data=None):\n            # Strategy logic\n            ...\n\
        \n    # Register via API\n    response = requests.post(\n        \"http://localhost:8002/api/v1/strategies/register\"\
        ,\n        json={\n            \"name\": \"FVG Retest Strategy\",\n      \
        \      \"description\": \"Trades FVG retests with bias confirmation\",\n \
        \           \"version\": \"1.0.0\",\n            \"author\": \"researcher@nqhub.com\"\
        ,\n            \"strategy_type\": \"rule_based\",\n            \"strategy_class\"\
        : \"MyFVGStrategy\",\n            \"strategy_module\": \"__main__\",\n   \
        \         \"parameters\": {\"min_fvg_score\": 0.7},\n            \"tags\"\
        : [\"fvg\", \"retest\", \"ict\"]\n        },\n        headers={\"Authorization\"\
        : f\"Bearer {token}\"}\n    )\n\nArgs:\n    request: Registration request\
        \ with strategy metadata\n    current_user: Authenticated user\n\nReturns:\n\
        \    Registration result with validation info\n\nNote:\n    In this implementation,\
        \ we store metadata only.\n    The actual strategy class instance should be\
        \ created\n    and registered programmatically (not via HTTP serialization\n\
        \    for security reasons)."
