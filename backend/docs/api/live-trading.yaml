      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/api/v1/data/candles/{timeframe}:
    get:
      tags:
      - data
      - data
      summary: Get Candles
      description: 'Get candlestick data for a specific timeframe.


        Supports cursor-based pagination for efficient TimescaleDB queries.


        **Valid timeframes:** 30s, 1min, 5min, 15min, 1h, 4h, 1d, 1w


        **Pagination:** Use the `next_cursor` from the response in subsequent requests.


        **Order flow data:** Set `include_orderflow=true` to include delta, POC, and
        footprint.

        Note: This is slower due to JSONB field loading.'
      operationId: get_candles_api_v1_api_v1_data_candles__timeframe__get
      parameters:
      - name: timeframe
        in: path
        required: true
        schema:
          type: string
          title: Timeframe
      - name: start
        in: query
        required: true
        schema:
          type: string
          format: date-time
          description: Start datetime
          title: Start
        description: Start datetime
      - name: end
        in: query
        required: true
        schema:
          type: string
          format: date-time
          description: End datetime
          title: End
        description: End datetime
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 5000
          description: Maximum candles to return
          default: 500
          title: Limit
        description: Maximum candles to return
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Pagination cursor (timestamp)
          title: Cursor
        description: Pagination cursor (timestamp)
      - name: include_orderflow
        in: query
        required: false
        schema:
          type: boolean
          description: Include delta, poc, and footprint
          default: false
          title: Include Orderflow
        description: Include delta, poc, and footprint
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandlesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/api/v1/data/ticks:
    get:
      tags:
      - data
      - data
      summary: Get Ticks
      description: 'Get tick data in TBBO (Top of Book) format.


        Returns bid/ask prices and sizes with microsecond timestamps.


        **Note:** Tick data is very granular. Use pagination to retrieve large datasets.'
      operationId: get_ticks_api_v1_api_v1_data_ticks_get
      parameters:
      - name: start
        in: query
        required: true
        schema:
          type: string
          format: date-time
          description: Start datetime
          title: Start
        description: Start datetime
      - name: end
        in: query
        required: true
        schema:
          type: string
          format: date-time
          description: End datetime
          title: End
        description: End datetime
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 10000
          description: Maximum ticks to return
          default: 1000
          title: Limit
        description: Maximum ticks to return
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
